name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v2-${{ hashFiles('**/*.gradle', 'gradle.properties') }}
          restore-keys: gradle-v2-

      - name: Cache ForgeGradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/forge_gradle
          key: forgegradle-${{ hashFiles('build.gradle') }}
          restore-keys: forgegradle-

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon
